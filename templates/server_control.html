<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="JAGWAR HOST - Server Control Panel">
    <meta name="theme-color" content="#0a0c0f">
    <title>{{ server.name }} — JAGWAR HOST</title>
    <style>
        :root {
            --neon-blue: #0a84ff;
            --neon-blue-dark: #0066cc;
            --neon-green: #22c55e;
            --neon-red: #ef4444;
            --neon-yellow: #f59e0b;
            --neon-purple: #a855f7;
            --neon-cyan: #06b6d4;
            --neon-glow: 0 0 30px rgba(10, 132, 255, 0.5);
            --neon-glow-strong: 0 0 60px rgba(10, 132, 255, 0.8);
            --neon-glow-subtle: 0 0 15px rgba(10, 132, 255, 0.3);
            --neon-glow-green: 0 0 20px rgba(34, 197, 94, 0.5);
            --neon-glow-red: 0 0 20px rgba(239, 68, 68, 0.5);
            --dark-bg: #0a0c0f;
            --dark-surface: #11151a;
            --dark-card: rgba(18, 22, 28, 0.85);
            --dark-input: #161b22;
            --dark-console: #000000;
            --border-glow: 1px solid rgba(10, 132, 255, 0.35);
            --border-subtle: 1px solid #2d333b;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --text-tertiary: #6b7280;
            --console-green: #0aff0a;
            --console-blue: #0af;
            --console-yellow: #ff0;
            --console-red: #f44;
            --gradient-blue: linear-gradient(135deg, #0a84ff 0%, #3b9eff 50%, #0066cc 100%);
            --radius-xl: 2rem;
            --radius-lg: 1.5rem;
            --radius-md: 1rem;
            --radius-sm: 0.75rem;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-medium: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Fira Code', monospace;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========== NAVBAR ========== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 3%;
            background: rgba(15, 18, 24, 0.9);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(10, 132, 255, 0.25);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .btn-back {
            color: var(--neon-blue);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all var(--transition-fast);
            padding: 0.4rem 0.8rem;
            border-radius: 50px;
        }

        .btn-back:hover {
            background: rgba(10, 132, 255, 0.1);
            text-shadow: 0 0 15px rgba(10, 132, 255, 0.5);
        }

        .server-title {
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .server-title .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
        }

        .status-dot.running { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); animation: pulse 2s infinite; }
        .status-dot.stopped { background: #6b7280; }
        .status-dot.error { background: var(--neon-red); box-shadow: 0 0 10px var(--neon-red); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-badge {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* ========== MAIN LAYOUT ========== */
        .main-container {
            display: flex;
            flex: 1;
            gap: 1.5rem;
            padding: 1.5rem;
            min-height: 0;
        }

        /* ========== CONSOLE PANEL ========== */
        .console-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .panel-card {
            background: var(--dark-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: var(--border-glow);
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            padding: 1rem 1.2rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--radius-md);
            margin-bottom: 1.2rem;
            border: var(--border-subtle);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .status-label {
            color: var(--text-tertiary);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .status-value {
            font-weight: 700;
            font-family: 'Fira Code', monospace;
            color: var(--neon-blue);
            font-size: 0.95rem;
        }

        .status-value.running { color: var(--neon-green); }
        .status-value.stopped { color: var(--text-tertiary); }

        /* Button Groups */
        .btn-group {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition-medium);
            font-family: inherit;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-start {
            background: rgba(34, 197, 94, 0.2);
            color: var(--neon-green);
            border: 1px solid rgba(34, 197, 94, 0.4);
        }
        .btn-start:hover:not(:disabled) {
            background: rgba(34, 197, 94, 0.3);
            box-shadow: var(--neon-glow-green);
            transform: translateY(-2px);
        }

        .btn-stop {
            background: rgba(239, 68, 68, 0.2);
            color: var(--neon-red);
            border: 1px solid rgba(239, 68, 68, 0.4);
        }
        .btn-stop:hover:not(:disabled) {
            background: rgba(239, 68, 68, 0.3);
            box-shadow: var(--neon-glow-red);
            transform: translateY(-2px);
        }

        .btn-restart {
            background: rgba(245, 158, 11, 0.2);
            color: var(--neon-yellow);
            border: 1px solid rgba(245, 158, 11, 0.4);
        }
        .btn-restart:hover:not(:disabled) {
            background: rgba(245, 158, 11, 0.3);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.5);
            transform: translateY(-2px);
        }

        .btn-clear {
            background: rgba(107, 114, 128, 0.2);
            color: var(--text-secondary);
            border: 1px solid #2d333b;
        }
        .btn-clear:hover:not(:disabled) {
            background: rgba(107, 114, 128, 0.3);
            transform: translateY(-2px);
        }

        /* Console */
        .console-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .console-title {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .console-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            background: transparent;
            border: var(--border-subtle);
            color: var(--text-tertiary);
            padding: 0.3rem 0.6rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all var(--transition-fast);
        }

        .btn-icon:hover {
            color: var(--neon-blue);
            border-color: var(--neon-blue);
        }

        #console-output {
            background: var(--dark-console);
            color: var(--console-green);
            flex: 1;
            padding: 1.2rem;
            border-radius: var(--radius-md);
            overflow-y: auto;
            font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace;
            font-size: 0.82rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 350px;
            max-height: 55vh;
            border: 1px solid #1a1a1a;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
        }

        #console-output .line-number {
            color: #444;
            margin-right: 1rem;
            user-select: none;
        }

        #console-output .stderr {
            color: var(--console-red);
        }

        #console-output .timestamp {
            color: var(--console-yellow);
        }

        #console-output .info {
            color: var(--console-blue);
        }

        /* ========== FILE PANEL ========== */
        .file-panel {
            width: 420px;
            display: flex;
            flex-direction: column;
            min-width: 350px;
        }

        .file-panel .panel-card {
            flex: 1;
            min-height: 0;
        }

        .file-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .file-title {
            font-weight: 700;
            color: var(--neon-blue);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .file-actions-bar {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .btn-file {
            padding: 0.45rem 0.9rem;
            border: var(--border-subtle);
            background: var(--dark-input);
            color: var(--text-secondary);
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 500;
            transition: all var(--transition-fast);
            font-family: inherit;
            white-space: nowrap;
        }

        .btn-file:hover {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            background: rgba(10, 132, 255, 0.1);
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            min-height: 200px;
            border: var(--border-subtle);
            border-radius: var(--radius-md);
            background: rgba(0, 0, 0, 0.2);
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0.8rem;
            border-bottom: 1px solid rgba(45, 51, 59, 0.5);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: 0.85rem;
        }

        .file-item:hover {
            background: rgba(10, 132, 255, 0.05);
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-name {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
            min-width: 0;
        }

        .file-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }

        .file-name-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-size {
            color: var(--text-tertiary);
            font-size: 0.75rem;
            margin-right: 0.5rem;
        }

        .file-item-actions {
            display: flex;
            gap: 0.3rem;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .file-item:hover .file-item-actions {
            opacity: 1;
        }

        .btn-item {
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 0.75rem;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            transition: all var(--transition-fast);
        }

        .btn-item:hover {
            color: var(--neon-blue);
            background: rgba(10, 132, 255, 0.1);
        }

        .btn-item.delete:hover {
            color: var(--neon-red);
            background: rgba(239, 68, 68, 0.1);
        }

        .disk-info {
            margin-top: 0.8rem;
            font-size: 0.78rem;
            color: var(--text-tertiary);
            text-align: center;
        }

        /* ========== MODAL ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--dark-card);
            border: var(--border-glow);
            border-radius: var(--radius-xl);
            padding: 2rem;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
        }

        .modal-title {
            font-weight: 700;
            color: var(--neon-blue);
            font-size: 1.1rem;
        }

        .modal-close {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color var(--transition-fast);
        }

        .modal-close:hover {
            color: var(--neon-red);
        }

        .modal-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        #editor-textarea {
            flex: 1;
            background: var(--dark-console);
            color: var(--console-green);
            border: var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            resize: none;
            min-height: 300px;
            outline: none;
        }

        #editor-textarea:focus {
            border-color: var(--neon-blue);
        }

        .modal-footer {
            display: flex;
            gap: 0.8rem;
            justify-content: flex-end;
            margin-top: 1rem;
        }

        .btn-save {
            background: var(--gradient-blue);
            color: #fff;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-medium);
        }

        .btn-save:hover {
            box-shadow: var(--neon-glow-strong);
        }

        .btn-cancel {
            background: transparent;
            border: var(--border-subtle);
            color: var(--text-secondary);
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .btn-cancel:hover {
            border-color: var(--neon-red);
            color: var(--neon-red);
        }

        /* ========== TOAST ========== */
        .toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            padding: 0.9rem 1.5rem;
            border-radius: var(--radius-md);
            color: #fff;
            font-weight: 500;
            font-size: 0.85rem;
            animation: slideInRight 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .toast-success { background: #065f46; border: 1px solid #34d399; }
        .toast-error { background: #7f1d1d; border: 1px solid #f87171; }
        .toast-info { background: #1e3a5f; border: 1px solid #60a5fa; }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ========== FOOTER ========== */
        .footer {
            text-align: center;
            padding: 1rem;
            color: var(--text-tertiary);
            border-top: 1px solid rgba(10, 132, 255, 0.2);
            font-size: 0.8rem;
            letter-spacing: 0.3px;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 1000px) {
            .main-container {
                flex-direction: column;
            }
            .file-panel {
                width: 100%;
                min-width: 0;
            }
            #console-output {
                max-height: 350px;
            }
        }

        @media (max-width: 600px) {
            .main-container { padding: 0.8rem; }
            .status-bar { gap: 0.8rem; }
            .btn-group { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
            .file-actions-bar { flex-direction: column; }
            .btn-file { width: 100%; text-align: center; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #2d333b; border-radius: 3px; }
        ::selection { background: rgba(10, 132, 255, 0.3); color: #fff; }
    </style>
</head>
<body>
    <!-- ========== NAVBAR ========== -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="/dashboard" class="btn-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Dashboard
            </a>
            <div class="server-title">
                <span class="status-dot {{ 'running' if server.get('process_info', {}).get('running') else 'stopped' }}" id="navStatusDot"></span>
                {{ server.name }}
            </div>
        </div>
        <div class="nav-right">
            <span class="user-badge">👤 {{ username }}</span>
        </div>
    </nav>

    <!-- ========== MAIN CONTENT ========== -->
    <div class="main-container">
        <!-- Console Panel -->
        <div class="console-panel">
            <div class="panel-card">
                <!-- Status Bar -->
                <div class="status-bar">
                    <div class="status-item">
                        <span class="status-label">Status</span>
                        <span class="status-value" id="statusText">-</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">PID</span>
                        <span class="status-value" id="statusPid">-</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">CPU</span>
                        <span class="status-value" id="statusCpu">0%</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">RAM</span>
                        <span class="status-value" id="statusRam">0 MB</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">Uptime</span>
                        <span class="status-value" id="statusUptime">0s</span>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="btn-group">
                    <button class="btn btn-start" onclick="controlServer('start')" id="btnStart">
                        ▶ Start Server
                    </button>
                    <button class="btn btn-stop" onclick="controlServer('stop')" id="btnStop">
                        ⏹ Stop Server
                    </button>
                    <button class="btn btn-restart" onclick="controlServer('restart')" id="btnRestart">
                        ↻ Restart Server
                    </button>
                    <button class="btn btn-clear" onclick="clearConsole()">
                        🧹 Clear Console
                    </button>
                </div>

                <!-- Console Output -->
                <div class="console-wrapper">
                    <div class="console-header">
                        <span class="console-title">📟 Live Console Output</span>
                        <div class="console-actions">
                            <button class="btn-icon" onclick="copyConsole()" title="Copy output">📋</button>
                            <button class="btn-icon" onclick="scrollToBottom()" title="Scroll to bottom">⬇</button>
                        </div>
                    </div>
                    <div id="console-output">
                        <span class="timestamp">[{{ server.get('created_at', '')[:19] }}]</span> 
                        <span class="info">JAGWAR HOST Console Ready.</span>
                        Waiting for server output...
                    </div>
                </div>
            </div>
        </div>

        <!-- File Panel -->
        <div class="file-panel">
            <div class="panel-card">
                <div class="file-header">
                    <div class="file-title">📁 File Manager</div>
                </div>

                <div class="file-actions-bar">
                    <button class="btn-file" onclick="createNewFile()">➕ New File</button>
                    <button class="btn-file" onclick="createNewFolder()">📂 New Folder</button>
                    <button class="btn-file" onclick="document.getElementById('uploadInput').click()">📤 Upload</button>
                    <input type="file" id="uploadInput" style="display:none;" onchange="uploadFile(this)">
                </div>

                <div class="file-list" id="fileList">
                    <div style="text-align:center;padding:2rem;color:var(--text-tertiary);">Loading files...</div>
                </div>

                <div class="disk-info" id="diskInfo"></div>
            </div>
        </div>
    </div>

    <!-- ========== EDITOR MODAL ========== -->
    <div class="modal-overlay" id="editorModal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Edit File</span>
                <button class="modal-close" onclick="closeEditor()">✕</button>
            </div>
            <div class="modal-body">
                <textarea id="editor-textarea" placeholder="File content..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeEditor()">Cancel</button>
                <button class="btn-save" onclick="saveFile()">💾 Save Changes</button>
            </div>
        </div>
    </div>

    <!-- ========== TOAST CONTAINER ========== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ========== FOOTER ========== -->
    <footer class="footer">
        {{ footer_text }}
    </footer>

    <script>
        const serverName = "{{ server.name }}";
        const consoleEl = document.getElementById('console-output');
        let eventSource = null;
        let currentFile = null;

        // ========== CONSOLE FUNCTIONS ==========
        function controlServer(action) {
            const btns = document.querySelectorAll('.btn-group .btn');
            btns.forEach(b => b.disabled = true);

            fetch(`/api/server/${action}/${serverName}`, { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message || `${action} completed`, data.success ? 'success' : 'error');
                    if (action === 'start' || action === 'restart') {
                        setTimeout(startConsoleStream, 500);
                    }
                    if (action === 'stop') {
                        closeEventSource();
                    }
                    updateStatus();
                })
                .catch(err => showToast('Error: ' + err.message, 'error'))
                .finally(() => {
                    btns.forEach(b => b.disabled = false);
                });
        }

        function startConsoleStream() {
            closeEventSource();
            consoleEl.innerHTML = '<span class="info">Connecting to console...</span>\n';
            
            eventSource = new EventSource(`/api/server/console/${serverName}`);
            
            eventSource.onmessage = function(event) {
                const line = event.data;
                if (line.startsWith('[SERVER_NOT_RUNNING]')) {
                    consoleEl.innerHTML += '\n<span class="stderr">[Server is not running]</span>\n';
                    closeEventSource();
                } else if (line.startsWith('[PROCESS_ENDED]')) {
                    consoleEl.innerHTML += '\n<span class="stderr">[Process ended]</span>\n';
                    closeEventSource();
                } else if (line.startsWith('[STOPPED]')) {
                    consoleEl.innerHTML += '\n<span class="stderr">[Server stopped]</span>\n';
                    closeEventSource();
                } else if (line.startsWith('[EXIT:')) {
                    consoleEl.innerHTML += `\n<span class="stderr">[Process exited with code: ${line}]</span>\n`;
                    closeEventSource();
                } else {
                    consoleEl.innerHTML += line;
                }
                scrollToBottom();
            };

            eventSource.onerror = function() {
                consoleEl.innerHTML += '\n<span class="stderr">[Connection lost - reconnecting...]</span>\n';
                closeEventSource();
                setTimeout(startConsoleStream, 3000);
            };
        }

        function closeEventSource() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
        }

        function clearConsole() {
            consoleEl.innerHTML = '<span class="info">Console cleared.</span>\n';
        }

        function copyConsole() {
            const text = consoleEl.innerText;
            navigator.clipboard.writeText(text).then(() => {
                showToast('Console output copied!', 'success');
            });
        }

        function scrollToBottom() {
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        // ========== STATUS UPDATES ==========
        function updateStatus() {
            fetch(`/api/server/status/${serverName}`)
                .then(r => r.json())
                .then(data => {
                    const statusEl = document.getElementById('statusText');
                    const dotEl = document.getElementById('navStatusDot');
                    
                    if (data.running) {
                        statusEl.textContent = 'RUNNING';
                        statusEl.className = 'status-value running';
                        dotEl.className = 'status-dot running';
                    } else {
                        statusEl.textContent = 'STOPPED';
                        statusEl.className = 'status-value stopped';
                        dotEl.className = 'status-dot stopped';
                    }
                    
                    document.getElementById('statusPid').textContent = data.pid || '-';
                    document.getElementById('statusCpu').textContent = data.cpu_percent + '%';
                    document.getElementById('statusRam').textContent = data.memory_mb + ' MB';
                    document.getElementById('statusUptime').textContent = data.uptime_seconds + 's';
                })
                .catch(() => {});
        }

        // ========== FILE MANAGER ==========
        function loadFiles() {
            fetch(`/api/files/list/${serverName}`)
                .then(r => r.json())
                .then(data => {
                    let html = '';
                    if (data.files && data.files.length > 0) {
                        data.files.forEach(file => {
                            const icon = file.type === 'directory' ? '📁' : getFileIcon(file.name);
                            const sizeStr = file.type === 'file' ? formatSize(file.size) : '';
                            html += `
                                <div class="file-item">
                                    <div class="file-name" onclick="${file.type === 'file' ? `openEditor('${file.path}')` : ''}">
                                        <span class="file-icon">${icon}</span>
                                        <span class="file-name-text">${file.name}</span>
                                    </div>
                                    <span class="file-size">${sizeStr}</span>
                                    <div class="file-item-actions">
                                        ${file.type === 'file' ? `<button class="btn-item" onclick="openEditor('${file.path}')" title="Edit">✏️</button>` : ''}
                                        <button class="btn-item" onclick="renameItem('${file.path}')" title="Rename">✏️</button>
                                        <button class="btn-item delete" onclick="deleteItem('${file.path}')" title="Delete">🗑</button>
                                    </div>
                                </div>`;
                        });
                    } else {
                        html = '<div style="text-align:center;padding:2rem;color:var(--text-tertiary);">No files yet</div>';
                    }
                    document.getElementById('fileList').innerHTML = html;
                    
                    if (data.disk_usage) {
                        document.getElementById('diskInfo').textContent = 
                            `Disk: ${formatSize(data.disk_usage.total_size)} | Files: ${data.disk_usage.file_count} | Folders: ${data.disk_usage.dir_count}`;
                    }
                });
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                py: '🐍', js: '📜', html: '🌐', css: '🎨', json: '📋',
                txt: '📄', md: '📝', yml: '⚙️', yaml: '⚙️', cfg: '⚙️',
                ini: '⚙️', conf: '⚙️', sh: '💻', bat: '💻', xml: '📰',
                csv: '📊', sql: '🗄️', gitignore: '🙈', dockerfile: '🐳'
            };
            return icons[ext] || '📄';
        }

        function formatSize(bytes) {
            if (!bytes) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB'];
            let i = 0;
            while (bytes >= 1024 && i < units.length - 1) {
                bytes /= 1024;
                i++;
            }
            return bytes.toFixed(1) + ' ' + units[i];
        }
