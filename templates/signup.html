<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - JAGWAR HOST</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .signup-container {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            border: 1px solid #0077ff;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logo {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #0077ff, #00ccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #0077ff;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #0077ff;
        }

        button {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #0077ff, #0055cc);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        button:hover {
            transform: scale(1.02);
        }

        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            border-radius: 10px;
            padding: 0.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .success {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #00ff00;
            border-radius: 10px;
            padding: 0.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .login-link {
            text-align: center;
            margin-top: 1rem;
            color: #aaa;
        }

        .login-link a {
            color: #0077ff;
            text-decoration: none;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="logo">JAGWAR<span style="color:#ff6600">HOST</span></div>
        <h2>Create New Account</h2>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        {% if success %}
        <div class="success">{{ success }}</div>
        {% endif %}
        
        <form method="POST">
            <input type="text" name="username" placeholder="Username (3-20 characters)" value="{{ username or '' }}" required>
            <input type="email" name="email" placeholder="Email (optional)" value="{{ email or '' }}">
            <input type="password" name="password" placeholder="Password (min 6 characters)" required>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
            <button type="submit">Create Account</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="/">Sign In</a>
        </div>
        
        <div class="footer">
            جميع الحقوق محفوظة JAGWAR 2026
        </div>
    </div>
</body>
</html>
