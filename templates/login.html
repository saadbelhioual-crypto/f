<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Sign in to JAGWAR HOST - Enterprise Python Hosting Platform">
    <meta name="theme-color" content="#0a0c0f">
    <title>Sign In — JAGWAR HOST</title>
    <style>
        :root {
            --neon-blue: #0a84ff;
            --neon-blue-dark: #0066cc;
            --neon-blue-light: #3b9eff;
            --neon-glow: 0 0 30px rgba(10, 132, 255, 0.5);
            --neon-glow-strong: 0 0 60px rgba(10, 132, 255, 0.8);
            --neon-glow-subtle: 0 0 15px rgba(10, 132, 255, 0.3);
            --dark-bg: #0a0c0f;
            --dark-surface: #11151a;
            --dark-card: rgba(18, 22, 28, 0.9);
            --dark-input: #161b22;
            --border-glow: 1px solid rgba(10, 132, 255, 0.35);
            --border-input: 1px solid #2d333b;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --text-tertiary: #6b7280;
            --gradient-blue: linear-gradient(135deg, #0a84ff 0%, #3b9eff 50%, #0066cc 100%);
            --radius-xl: 2.5rem;
            --radius-lg: 1.5rem;
            --radius-md: 1rem;
            --radius-sm: 0.75rem;
            --transition-medium: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(10, 132, 255, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(10, 132, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(59, 158, 255, 0.03) 0%, transparent 50%);
            padding: 2rem;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            animation: fadeSlideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            max-width: 460px;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-card {
            background: var(--dark-card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: var(--border-glow);
            border-radius: var(--radius-xl);
            padding: 3.5rem 2.8rem;
            box-shadow: 
                0 0 60px rgba(10, 132, 255, 0.1),
                0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #0a84ff 0%, #3b9eff 100%);
            opacity: 0.7;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
            z-index: 1;
        }

        .logo-icon {
            width: 65px;
            height: 65px;
            background: var(--gradient-blue);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1.2rem;
            box-shadow: var(--neon-glow);
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 25px rgba(10, 132, 255, 0.4); }
            50% { box-shadow: 0 0 50px rgba(10, 132, 255, 0.9); }
        }

        .logo-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.8px;
            background: var(--gradient-blue);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 15px rgba(10, 132, 255, 0.3));
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.4rem;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.08);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff6b6b;
            padding: 1rem 1.2rem;
            border-radius: var(--radius-md);
            text-align: center;
            margin-bottom: 1.8rem;
            font-size: 0.9rem;
            font-weight: 500;
            position: relative;
            z-index: 1;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .form-group {
            margin-bottom: 1.8rem;
            position: relative;
            z-index: 1;
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
            font-size: 0.88rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            font-size: 1.1rem;
            transition: color var(--transition-fast);
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.2rem 1rem 3rem;
            background: var(--dark-input);
            border: var(--border-input);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all var(--transition-medium);
        }

        .form-input::placeholder { color: var(--text-tertiary); font-size: 0.9rem; }

        .form-input:focus {
            border-color: var(--neon-blue);
            box-shadow: var(--neon-glow-subtle), 0 0 0 3px rgba(10, 132, 255, 0.1);
            background: #1a1f28;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            accent-color: var(--neon-blue);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--neon-blue);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all var(--transition-fast);
        }

        .forgot-password:hover {
            text-shadow: 0 0 15px rgba(10, 132, 255, 0.5);
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 1.1rem;
            background: var(--gradient-blue);
            border: none;
            border-radius: 50px;
            color: #ffffff;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all var(--transition-medium);
            box-shadow: var(--neon-glow-subtle);
            letter-spacing: 0.03em;
            position: relative;
            z-index: 1;
            overflow: hidden;
            font-family: inherit;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-submit:hover {
            box-shadow: var(--neon-glow-strong);
            transform: translateY(-2px);
        }

        .btn-submit:hover::before { width: 400px; height: 400px; }
        .btn-submit:active { transform: translateY(0); box-shadow: var(--neon-glow-subtle); }

        .back-link {
            text-align: center;
            margin-top: 1.8rem;
            position: relative;
            z-index: 1;
        }

        .back-link a {
            color: var(--text-tertiary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .back-link a:hover { color: var(--neon-blue); }

        .footer {
            margin-top: 2.5rem;
            color: var(--text-tertiary);
            font-size: 0.85rem;
            text-align: center;
            position: relative;
            z-index: 1;
            letter-spacing: 0.3px;
        }

        @media (max-width: 480px) {
            .login-card { padding: 2.5rem 1.8rem; border-radius: var(--radius-lg); }
            .logo-title { font-size: 1.6rem; }
            .form-options { flex-direction: column; gap: 1rem; align-items: flex-start; }
            body { padding: 1rem; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark-bg); }
        ::-webkit-scrollbar-thumb { background: #2d333b; border-radius: 3px; }
        ::selection { background: rgba(10, 132, 255, 0.3); color: #ffffff; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo-section">
                <div class="logo-icon">⚡</div>
                <h1 class="logo-title">JAGWAR HOST</h1>
                <p class="subtitle">Sign in to your account</p>
            </div>

            <!-- Error Message -->
            {% if error %}
            <div class="error-message">⚠️ {{ error }}</div>
            {% endif %}

            <!-- Login Form -->
            <form method="POST" action="/login" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            class="form-input" 
                            placeholder="Enter your username"
                            required 
                            autocomplete="username"
                            autofocus
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input" 
                            placeholder="Enter your password"
                            required 
                            autocomplete="current-password"
                        >
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    Sign In
                </button>
            </form>
        </div>

        <!-- Back Link -->
        <div class="back-link">
            <a href="/">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to Home
            </a>
        </div>

        <!-- Footer -->
        <div class="footer">
            {{ footer_text }}
        </div>
    </div>

    <script>
        // Form submission
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', function() {
            submitBtn.textContent = 'Signing in...';
            submitBtn.style.opacity = '0.7';
        });

        // Input focus effects
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('.input-icon').style.color = 'var(--neon-blue)';
            });
            input.addEventListener('blur', function() {
                this.parentElement.querySelector('.input-icon').style.color = 'var(--text-tertiary)';
            });
        });

        console.log('⚡ JAGWAR HOST - Login Portal');
    </script>
</body>
</html>
